name: Java CI with Maven # Workflow 名称 # ① 触发条件 — 向 main/dev 分支 push，或对 main 发起 PR on: push: branches: ["main", "dev"] pull_request: branches: ["main"] jobs: # ② Job 1: Checkstyle 代码风格检查 checkstyle: name: 代码风格检查 (Checkstyle) runs-on: ubuntu-latest steps: - name: 检出代码 uses: actions/checkout@v4 - name: 配置 JDK 21 uses: actions/setup-java@v4 with: java-version: '21' distribution: 'temurin' # Eclipse Temurin 发行版 cache: maven # 启用 Maven 依赖缓存加速 - name: 运行 Checkstyle 检查 run: mvn checkstyle:check # ③ Job 2: 编译 + 测试（依赖 checkstyle 通过，多 JDK 矩阵） build-and-test: name: 编译与测试 runs-on: ubuntu-latest needs: checkstyle # checkstyle 通过后才执行 strategy: matrix: java-version: ['21', '22', '23'] # 多 JDK 版本矩阵并行测试 steps: - uses: actions/checkout@v4 - name: 配置 JDK ${{ matrix.java-version }} uses: actions/setup-java@v4 with: java-version: ${{ matrix.java-version }} distribution: 'temurin' cache: maven # 注意：Maven 的 test 阶段会自动先执行 compile - name: 编译并运行测试 run: mvn -B test --no-transfer-progress # -B: 批处理模式（非交互）；--no-transfer-progress: 减少日志噪音 # 即使测试失败也上传报告（用于问题溯源） - name: 上传测试报告 if: always() # 无论前面成败都执行 uses: actions/upload-artifact@v4 with: name: test-report-jdk-${{ matrix.java-version }} path: target/surefire-reports/ # JUnit XML 报告目录 # ④ Job 3: 打包（仅在 main 分支 push 且 前两步均通过 后执行） package: name: 打包 JAR runs-on: ubuntu-latest needs: build-and-test if: github.ref == 'refs/heads/main' # 仅 main 分支 steps: - uses: actions/checkout@v4 - name: 配置 JDK 21 uses: actions/setup-java@v4 with: java-version: '21' distribution: 'temurin' cache: maven - name: 构建可执行 JAR run: mvn -B package -DskipTests --no-transfer-progress # -DskipTests: 跳过测试（前面已经跑过了） - name: 验证 JAR 可运行 run: java -jar target/my-app-1.0-SNAPSHOT.jar - name: 上传 JAR 制品 uses: actions/upload-artifact@v4 with: name: my-app-jar path: target/*.jar # ⑤ Job 4: 构建通知（汇总） notify: name: 构建状态汇总 runs-on: ubuntu-latest needs: [checkstyle, build-and-test, package] if: always() && github.ref == 'refs/heads/main' steps: - name: 输出构建摘要 run: | echo "========================================" echo " 构建流水线执行完毕" echo "========================================" echo "提交者: ${{ github.actor }}" echo "分支: ${{ github.ref_name }}" echo "SHA: ${{ github.sha }}" echo "仓库: ${{ github.repository }}"